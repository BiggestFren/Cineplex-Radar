# Deploy this file from Dockhand Git Integration, or paste it into Compose Manager Plus.
services:
  radar:
    image: ${RADAR_IMAGE:-ghcr.io/biggestfren/cineplex-radar:latest}
    build:
      context: https://github.com/BiggestFren/Cineplex-Radar.git#main:backend
    pull_policy: missing
    container_name: cineplex-radar
    restart: unless-stopped
    environment:
      APP_AUTH_TOKEN: ${APP_AUTH_TOKEN:?Set a long random APP_AUTH_TOKEN}
      DATABASE_PATH: /state/radar.db
      ENABLE_WATCHER: ${ENABLE_WATCHER:-true}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-300}
      POLL_JITTER_SECONDS: ${POLL_JITTER_SECONDS:-45}
      BURST_MODE: ${BURST_MODE:-false}
      BURST_INTERVAL_SECONDS: ${BURST_INTERVAL_SECONDS:-45}
      BURST_UNTIL: ${BURST_UNTIL:-}
      CINEPLEX_BASE_URL: ${CINEPLEX_BASE_URL:-https://apis.cineplex.com/prod/cpx/theatrical/api}
      CINEPLEX_TICKETING_BASE_URL: ${CINEPLEX_TICKETING_BASE_URL:-https://apis.cineplex.com/prod/ticketing/api}
      CINEPLEX_SUBSCRIPTION_KEY: ${CINEPLEX_SUBSCRIPTION_KEY:?Set the current public Cineplex subscription key}
      CINEPLEX_USER_AGENT: ${CINEPLEX_USER_AGENT:-Mozilla/5.0 Radar/0.1}
      CINEPLEX_REFERER: https://www.cineplex.com/
      ENABLE_CINEPLEX_ACCOUNT: "false"
      ENABLE_CHECKOUT: "false"
      ALLOW_UNATTENDED_BUY: "false"
      NTFY_BASE_URL: http://ntfy:80
      NTFY_TOPIC: ${NTFY_TOPIC:?Set a long private NTFY_TOPIC}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_REGION: ${TMDB_REGION:-CA}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://nano-gpt.com/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      HOME_LATITUDE: ${HOME_LATITUDE:-43.6532}
      HOME_LONGITUDE: ${HOME_LONGITUDE:--79.3832}
    volumes:
      - ${APPDATA_ROOT:-/mnt/user/appdata/cineplex-radar}/radar:/state
    ports:
      - "${RADAR_PORT:-8000}:8000"
    depends_on:
      ntfy:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: cineplex-radar-ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: ${PUBLIC_NTFY_BASE_URL:?Set the public HTTPS ntfy URL}
      NTFY_BEHIND_PROXY: "true"
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_AUTH_FILE: /var/lib/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: ${NTFY_AUTH_DEFAULT_ACCESS:-read-write}
    volumes:
      - ${APPDATA_ROOT:-/mnt/user/appdata/cineplex-radar}/ntfy-cache:/var/cache/ntfy
      - ${APPDATA_ROOT:-/mnt/user/appdata/cineplex-radar}/ntfy-data:/var/lib/ntfy
    ports:
      - "${NTFY_PORT:-8080}:80"
    security_opt:
      - no-new-privileges:true
