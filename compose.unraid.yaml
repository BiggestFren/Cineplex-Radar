# Deploy this file from Dockhand Git Integration, or paste it into Compose Manager Plus.
services:
  radar:
    image: ${RADAR_IMAGE:-ghcr.io/biggestfren/cineplex-radar:latest}
    build:
      context: https://github.com/BiggestFren/Cineplex-Radar.git#main:backend
    pull_policy: missing
    container_name: cineplex-radar
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /state/radar.db
      NTFY_BASE_URL: http://ntfy:80
    volumes:
      - ${APPDATA_ROOT:-/mnt/user/appdata/cineplex-radar}/radar:/state
    ports:
      - "${RADAR_PORT:-8000}:8000"
    depends_on:
      ntfy:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: cineplex-radar-ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: ${PUBLIC_NTFY_BASE_URL}
      NTFY_BEHIND_PROXY: "true"
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_AUTH_FILE: /var/lib/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: ${NTFY_AUTH_DEFAULT_ACCESS:-read-write}
    volumes:
      - ${APPDATA_ROOT:-/mnt/user/appdata/cineplex-radar}/ntfy-cache:/var/cache/ntfy
      - ${APPDATA_ROOT:-/mnt/user/appdata/cineplex-radar}/ntfy-data:/var/lib/ntfy
    ports:
      - "${NTFY_PORT:-8080}:80"
    security_opt:
      - no-new-privileges:true
